<!DOCTYPE html>
<html>
<head>
    <title>Upload Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="top-header">
    Exam Hall Seating Arrangement System
</div>

<div class="main-container">

    <div class="sidebar">
        <h3>DASHBOARD</h3>
        <ul>
            <li><a href="{{ url_for('students_page') }}">👨‍🎓 Students</a></li>
            <li><a href="{{ url_for('uploaded_batches') }}">📁 Uploaded Students</a></li>

            <li><a href="{{ url_for('halls_page') }}">🏫 Exam Halls</a></li>

            <li><a href="{{ url_for('hall_plan') }}">🪑 Hall Plan</a></li>
            <li><a href="{{ url_for('logout') }}">🚪 Logout</a></li>
        </ul>
    </div>

    <div class="dashboard-content">
        <div class="back-container">
            <a href="{{ url_for('dashboard') }}" class="btn-back">
                ← Back to Dashboard
            </a>
        </div>
        <h2>Upload Students</h2>


        {% if message %}
            <p class="success">{{ message }}</p>
        {% endif %}

        <div class="form-box">

            <form method="POST" action="/upload_students" enctype="multipart/form-data">

                <div class="form-group">
                    <label>Department</label>
                    <select name="department" required>
                        <option value="">Select Department</option>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="IT">IT</option>
                        <option value="EEE">EEE</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Year</label>
                    <select name="year" multiple required>
                        <option value="1">I Year</option>
                        <option value="2">II Year</option>
                        <option value="3">III Year</option>
                        <option value="4">IV Year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Upload Student DOCX File</label>
                    <input type="file" name="file" accept=".docx" required>
                </div>

                <button type="submit" class="btn-primary">
                    Upload Students
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
